<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>คลังรูปภาพกิจกรรม</title>

  <!-- ═══ Fonts ═══ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- ═══ Tailwind CSS ═══ -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            kanit:  ['Kanit',  'sans-serif'],
            prompt: ['Prompt', 'sans-serif'],
          },
          colors: {
            brand: {
              50:  '#f0fdf4',
              100: '#dcfce7',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              900: '#14532d',
            },
            dark: {
              950: '#030712',
              900: '#0d1117',
              800: '#161b22',
              700: '#21262d',
              600: '#30363d',
              500: '#484f58',
              400: '#6e7681',
            }
          },
          animation: {
            'fade-up':    'fadeUp 0.5s ease both',
            'fade-in':    'fadeIn 0.3s ease both',
            'spin-slow':  'spin 1.5s linear infinite',
            'pulse-slow': 'pulse 2.5s cubic-bezier(0.4,0,0.6,1) infinite',
          },
          keyframes: {
            fadeUp: {
              '0%':   { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%':   { opacity: '0' },
              '100%': { opacity: '1' },
            },
          }
        }
      }
    };
  </script>

  <style>
    /* ── Global ── */
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --border:       #30363d;
      --text-primary: #e6edf3;
      --text-muted:   #8b949e;
      --accent:       #22c55e;
      --accent-dim:   rgba(34,197,94,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Prompt', sans-serif;
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glowing gradient mesh background ── */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 10%,  rgba(34,197,94,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 85% 80%,  rgba(16,185,129,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%,  rgba(20,83,45,0.08)  0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Header glow line ── */
    .header-line {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    /* ── Category pill ── */
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 0.375rem 1rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .pill-inactive {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text-muted);
    }
    .pill-inactive:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .pill-active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Card ── */
    .gallery-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .gallery-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(34,197,94,0.12), 0 2px 8px rgba(0,0,0,0.4);
    }
    .gallery-card:hover .card-img {
      transform: scale(1.04);
    }

    /* ── Card image ── */
    .card-img-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
      background: var(--dark-800);
    }
    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
      display: block;
    }
    .card-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--dark-700);
      color: var(--text-muted);
    }

    /* ── Overlay on hover ── */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: flex-end;
      padding: 1rem;
    }
    .gallery-card:hover .card-overlay { opacity: 1; }

    /* ── Category badge on card ── */
    .cat-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(34,197,94,0.35);
      font-family: 'Kanit', sans-serif;
    }

    /* ── Staggered animation for cards ── */
    .card-wrapper { animation: fadeUp 0.5s ease both; }
    .card-wrapper:nth-child(1)  { animation-delay: 0.05s; }
    .card-wrapper:nth-child(2)  { animation-delay: 0.10s; }
    .card-wrapper:nth-child(3)  { animation-delay: 0.15s; }
    .card-wrapper:nth-child(4)  { animation-delay: 0.20s; }
    .card-wrapper:nth-child(5)  { animation-delay: 0.25s; }
    .card-wrapper:nth-child(6)  { animation-delay: 0.30s; }
    .card-wrapper:nth-child(7)  { animation-delay: 0.35s; }
    .card-wrapper:nth-child(8)  { animation-delay: 0.40s; }
    .card-wrapper:nth-child(9)  { animation-delay: 0.45s; }
    .card-wrapper:nth-child(n+10) { animation-delay: 0.50s; }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.25s ease;
    }
    #lightbox.hidden { display: none; }

    .lightbox-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      max-width: 860px;
      width: 100%;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
      animation: fadeUp 0.3s ease;
    }

    @media (min-width: 768px) {
      .lightbox-card { flex-direction: row; max-height: 80vh; }
      .lightbox-img-side { width: 55%; flex-shrink: 0; }
      .lightbox-info-side { overflow-y: auto; }
    }

    .lightbox-img-side {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      max-height: 50vh;
    }
    @media (min-width: 768px) {
      .lightbox-img-side { max-height: none; }
    }

    .lightbox-img-side img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .lightbox-info-side {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* ── Spinner ── */
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Search ── */
    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 0.5rem 1rem 0.5rem 2.5rem;
      font-family: 'Prompt', sans-serif;
      font-size: 0.875rem;
      transition: border-color 0.2s;
      width: 100%;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { outline: none; border-color: var(--accent); }

    /* ── Close button ── */
    .close-btn {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      font-size: 1rem;
    }
    .close-btn:hover { background: rgba(255,255,255,0.2); }

    /* ── Stats bar ── */
    .stat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease infinite;
    }
  </style>
</head>

<body>
  <div class="bg-mesh"></div>

  <div class="relative z-10">

    <!-- ══════════════════ HEADER ══════════════════ -->
    <header class="sticky top-0 z-50 bg-dark-900/80 backdrop-blur-md border-b border-dark-700/60">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <!-- Logo icon -->
          <div class="w-9 h-9 rounded-lg bg-brand-700/40 border border-brand-600/30 flex items-center justify-center flex-shrink-0">
            <svg class="w-5 h-5 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
            </svg>
          </div>
          <div>
            <h1 class="font-kanit font-semibold text-white text-base sm:text-lg leading-tight">คลังรูปภาพกิจกรรม</h1>
            <p class="text-xs text-dark-400 font-prompt hidden sm:block">Photo Gallery System</p>
          </div>
        </div>
        <!-- Stats -->
        <div id="stats-bar" class="hidden items-center gap-2 text-xs text-dark-400 font-prompt">

    <!-- ══════════════════ HERO ══════════════════ -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 pt-10 pb-8 text-center">
      <p class="text-brand-400 text-xs font-kanit font-semibold tracking-[0.2em] uppercase mb-3 animate-fade-in" style="animation-delay:0.1s">Activity Photo Archive</p>
      <h2 class="font-kanit font-bold text-3xl sm:text-4xl md:text-5xl text-white mb-3 animate-fade-up" style="animation-delay:0.15s">
        ภาพกิจกรรม<span class="text-brand-400">ประจำปี</span>
      </h2>
      <p class="font-prompt text-dark-400 text-sm sm:text-base max-w-xl mx-auto animate-fade-up" style="animation-delay:0.2s">
        รวบรวมภาพบันทึกกิจกรรม โครงการ และงานสำคัญต่าง ๆ ของหน่วยงาน
      </p>
    </section>

    <!-- ══════════════════ CONTROLS ══════════════════ -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 mb-8 animate-fade-up" style="animation-delay:0.25s">
      <div class="bg-dark-800/60 border border-dark-700/60 rounded-xl p-4 flex flex-col sm:flex-row gap-4 items-start sm:items-center">

        <!-- Search -->
        <div class="relative flex-1 w-full sm:max-w-xs">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-dark-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
          </svg>
          <input id="search-input" class="search-input" type="text" placeholder="ค้นหากิจกรรม..." />

        <!-- Category pills -->

            <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />

  </footer>


  <!-- ══════════════════ JAVASCRIPT ══════════════════ -->
  <script>
    // ╔══════════════════════════════════════════════╗
    // ║  ⚙️  CONFIG — แก้ไขค่านี้เพียงจุดเดียว       ║
    // ╚══════════════════════════════════════════════╝
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyPghqA070LklU4Y7hmirLaUtKDu6ii8li7B3bWzRiNTKUMds-Gbt1kufT67SCuOd0s/exec";
    //                                                ↑ วางลิงก์ Web App ของคุณตรงนี้

    // ── State ──────────────────────────────────────
    let allItems        = [];   // ข้อมูลทั้งหมดจาก GAS
    let filteredItems   = [];   // หลังกรอง
    let currentCat      = "__all__";
    let currentSearch   = "";
    let lightboxIndex   = 0;

    // ── DOM refs ───────────────────────────────────
    const $grid         = document.getElementById("gallery-grid");
    const $loading      = document.getElementById("loading-state");
    const $error        = document.getElementById("error-state");
    const $errorMsg     = document.getElementById("error-msg");
    const $empty        = document.getElementById("empty-state");
    const $pills        = document.getElementById("category-pills");
    const $search       = document.getElementById("search-input");
    const $statsBar     = document.getElementById("stats-bar");
    const $statsText    = document.getElementById("stats-text");
    const $lightbox     = document.getElementById("lightbox");
    const $lbImg        = document.getElementById("lb-img");
    const $lbTitle      = document.getElementById("lb-title");
    const $lbDesc       = document.getElementById("lb-desc");
    const $lbCat        = document.getElementById("lb-cat");
    const $lbDate       = document.getElementById("lb-date");
    const $lbCounter    = document.getElementById("lb-counter");


    // ════════════════════════════════════════════════
    //  DATA LOADING
    // ════════════════════════════════════════════════
    async function loadGallery() {
      showState("loading");
      try {
        // ── ตรวจสอบว่าผู้ใช้ยังไม่ได้ตั้งค่า URL ──
        if (GAS_URL.includes("YOUR_DEPLOYMENT_ID")) {
          throw new Error("กรุณาตั้งค่า GAS_URL ในไฟล์ index.html ก่อนใช้งาน\n(แทนที่ YOUR_DEPLOYMENT_ID ด้วย Web App URL จริง)");
        }

        const res  = await fetch(GAS_URL, { redirect: "follow" });
        if (!res.ok) throw new Error("HTTP " + res.status + " — ไม่สามารถเชื่อมต่อ GAS ได้");

        const json = await res.json();
        if (json.status !== "success") throw new Error(json.message || "ข้อมูลไม่ถูกต้อง");

        allItems = json.data || [];
        buildCategoryPills();
        applyFilters();

        $statsBar.classList.remove("hidden");
        $statsBar.classList.add("flex");
        updateStats();

      } catch (err) {
        showState("error");
        $errorMsg.textContent = err.message;
        console.error("[Gallery]", err);
      }
    }

    // ════════════════════════════════════════════════
    //  FILTER & RENDER
    // ════════════════════════════════════════════════
    function applyFilters() {
      const q = currentSearch.toLowerCase().trim();
      filteredItems = allItems.filter(item => {
        const matchCat    = currentCat === "__all__" || item.category === currentCat;
        const matchSearch = !q ||
          item.title.toLowerCase().includes(q) ||
          item.description.toLowerCase().includes(q) ||
          item.category.toLowerCase().includes(q);
        return matchCat && matchSearch;
      });

      renderGrid();
      updateStats();
    }

    function renderGrid() {
      $grid.innerHTML = "";
      if (filteredItems.length === 0) { showState("empty"); return; }
      showState("grid");

      filteredItems.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "card-wrapper";
        card.innerHTML = buildCardHTML(item, index);
        card.querySelector(".gallery-card").addEventListener("click", () => openLightbox(index));
        $grid.appendChild(card);
      });
    }

    function buildCardHTML(item, index) {
      const placeholder = `
        <div class="card-img-placeholder">
          <svg class="w-10 h-10 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
            <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909M3.75 21h16.5M21 6.75v10.5A2.25 2.25 0 0 1 18.75 19.5H5.25A2.25 2.25 0 0 1 3 17.25V6.75A2.25 2.25 0 0 1 5.25 4.5h13.5A2.25 2.25 0 0 1 21 6.75Z" />
          </svg>
        </div>`;

      return `
        <div class="gallery-card group">
          <div class="card-img-wrap">
            ${item.imageUrl
              ? `<img class="card-img" src="${escHtml(item.imageUrl)}"
                   alt="${escHtml(item.title)}"
                   loading="lazy"
                   onerror="this.parentElement.innerHTML='${placeholder.replace(/"/g,"'")}'" />`
              : placeholder}
            ${item.category ? `<span class="cat-badge">${escHtml(item.category)}</span>` : ""}
            <div class="card-overlay">
              <span class="text-white text-xs font-prompt opacity-90 flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197M10.5 7.5v6m3-3h-6m13.5 3A7.5 7.5 0 1 1 3 10.5a7.5 7.5 0 0 1 18 0Z" />
                </svg>ดูรายละเอียด
              </span>
            </div>
          </div>
          <div class="p-3">
            <p class="font-kanit font-medium text-white text-sm leading-snug line-clamp-2 mb-1">${escHtml(item.title)}</p>
            ${item.date ? `<p class="font-prompt text-xs text-dark-400">${escHtml(item.date)}</p>` : ""}
          </div>
        </div>`;
    }

    // ════════════════════════════════════════════════
    //  CATEGORY PILLS
    // ════════════════════════════════════════════════
    function buildCategoryPills() {
      const cats = [...new Set(allItems.map(i => i.category).filter(Boolean))].sort();
      $pills.innerHTML = `<button class="pill pill-active" data-cat="__all__">ทั้งหมด (${allItems.length})</button>`;
      cats.forEach(cat => {
        const count = allItems.filter(i => i.category === cat).length;
        const btn   = document.createElement("button");
        btn.className   = "pill pill-inactive";
        btn.dataset.cat = cat;
        btn.textContent = `${cat} (${count})`;
        $pills.appendChild(btn);
      });
    }

    $pills.addEventListener("click", e => {
      const btn = e.target.closest("[data-cat]");
      if (!btn) return;
      currentCat = btn.dataset.cat;
      $pills.querySelectorAll(".pill").forEach(p => {
        p.className = p.dataset.cat === currentCat ? "pill pill-active" : "pill pill-inactive";
      });
      applyFilters();
    });

    // ════════════════════════════════════════════════
    //  SEARCH
    // ════════════════════════════════════════════════
    let searchTimer;
    $search.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        currentSearch = $search.value;
        applyFilters();
      }, 250);
    });

    // ════════════════════════════════════════════════
    //  LIGHTBOX
    // ════════════════════════════════════════════════
    function openLightbox(index) {
      lightboxIndex = index;
      renderLightbox();
      $lightbox.classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      $lightbox.classList.add("hidden");
      document.body.style.overflow = "";
      $lbImg.src = "";
    }

    function renderLightbox() {
      const item = filteredItems[lightboxIndex];
      if (!item) return;
      $lbImg.src           = item.imageUrl || "";
      $lbImg.alt           = item.title;
      $lbTitle.textContent = item.title;
      $lbDesc.textContent  = item.description || "ไม่มีคำอธิบาย";
      $lbCat.textContent   = item.category || "";
      $lbDate.textContent  = item.date || "";
      $lbCounter.textContent = `${lightboxIndex + 1} / ${filteredItems.length}`;

      document.getElementById("lb-prev").disabled = lightboxIndex === 0;
      document.getElementById("lb-next").disabled = lightboxIndex === filteredItems.length - 1;
      document.getElementById("lb-prev").style.opacity = lightboxIndex === 0 ? "0.4" : "1";
      document.getElementById("lb-next").style.opacity = lightboxIndex === filteredItems.length - 1 ? "0.4" : "1";
    }

    document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
    document.getElementById("lb-prev").addEventListener("click", () => { if (lightboxIndex > 0) { lightboxIndex--; renderLightbox(); } });
    document.getElementById("lb-next").addEventListener("click", () => { if (lightboxIndex < filteredItems.length - 1) { lightboxIndex++; renderLightbox(); } });

    $lightbox.addEventListener("click", e => { if (e.target === $lightbox) closeLightbox(); });

    document.addEventListener("keydown", e => {
      if ($lightbox.classList.contains("hidden")) return;
      if (e.key === "Escape")      closeLightbox();
      if (e.key === "ArrowLeft")   { if (lightboxIndex > 0) { lightboxIndex--; renderLightbox(); } }
      if (e.key === "ArrowRight")  { if (lightboxIndex < filteredItems.length - 1) { lightboxIndex++; renderLightbox(); } }
    });

    // ════════════════════════════════════════════════
    //  HELPERS
    // ════════════════════════════════════════════════
    function showState(state) {
      $loading.classList.add("hidden");    $loading.classList.remove("flex");
      $error.classList.add("hidden");      $error.classList.remove("flex");
      $empty.classList.add("hidden");      $empty.classList.remove("flex");
      $grid.classList.add("hidden");       $grid.classList.remove("grid");

      if (state === "loading") { $loading.classList.remove("hidden"); $loading.classList.add("flex"); }
      if (state === "error")   { $error.classList.remove("hidden");   $error.classList.add("flex"); }
      if (state === "empty")   { $empty.classList.remove("hidden");   $empty.classList.add("flex"); }
      if (state === "grid")    { $grid.classList.remove("hidden");    $grid.classList.add("grid"); }
    }

    function updateStats() {
      const total    = allItems.length;
      const showing  = filteredItems.length;
      $statsText.textContent = showing === total
        ? `แสดงทั้งหมด ${total} ภาพ`
        : `แสดง ${showing} จาก ${total} ภาพ`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // ════════════════════════════════════════════════
    //  INIT
    // ════════════════════════════════════════════════
    loadGallery();
  </script>
</body>
</html>
